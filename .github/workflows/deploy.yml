# .github/workflows/deploy.yml
# Automatically builds and deploys the React viewer to GitHub Pages
# on every push to the main branch.
#
# Prerequisites (one-time setup in your GitHub repo):
#   Settings → Pages → Source: "GitHub Actions"
#   Settings → Secrets → Actions → add VITE_BASE_PATH = /your-repo-name/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Only trigger when viewer source or generated pages change
      - 'viewer/**'
      - 'output/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress deployments when a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Viewer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: viewer/package.json

      - name: Install dependencies
        working-directory: viewer
        run: npm ci

      - name: Build
        working-directory: viewer
        env:
          # Set this secret in: Settings → Secrets → Actions
          # Value: /your-repository-name/  (with trailing slash)
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH || '/' }}
        run: npm run build

      # Copy generated pages into the dist folder for deployment
      - name: Copy extracted pages to dist
        run: |
          mkdir -p viewer/dist/pages
          if [ -d "output/pages" ] && [ "$(ls -A output/pages 2>/dev/null)" ]; then
            cp output/pages/*.md viewer/dist/pages/ 2>/dev/null || true
          fi
          if [ -f "output/index.json" ]; then
            cp output/index.json viewer/dist/
          fi
          if [ -f "output/theme.json" ]; then
            cp output/theme.json viewer/dist/
          fi
          if [ -f "output/cover.png" ]; then
            cp output/cover.png viewer/dist/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
